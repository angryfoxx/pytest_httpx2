---
default_install_hook_types: [pre-commit, pre-push]
default_stages: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: no-commit-to-branch
        stages: [pre-commit]
        args: [--branch, master]
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: debug-statements
  - repo: https://github.com/owenlamont/ryl-pre-commit
    rev: 3768c56155771d7fe56cecf87cd7c3a173867e5d  # frozen: v0.9.2
    hooks:
      - id: ryl
  - repo: https://github.com/tombi-toml/tombi-pre-commit
    rev: 92b75e984d8f88579b21001de632b48149d8166a  # frozen: v0.11.6
    hooks:
      - id: tombi-format
        args: [--offline]
      - id: tombi-lint
        args: [--offline]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 0c7b6c989466a93942def1f84baf36ddfcd60c83  # frozen: v0.15.14
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: ty
        name: ty check
        entry: uv run ty check pytest_httpx2
        language: system
        pass_filenames: false
