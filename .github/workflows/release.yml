---
name: Release

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Release workflow mode"
        required: true
        type: choice
        options:
          - prepare
          - release
      tag:
        description: "Release tag to publish (for example: v1.0.1)"
        required: false
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  prepare-release:
    name: Prepare release PR
    if: ${{ inputs.mode == 'prepare' }}
    runs-on: ubuntu-latest
    steps:
      # googleapis/release-please-action v5
      - uses:
          googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7
        with:
          skip-github-release: true
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: master

  create-release:
    name: Create GitHub release
    if: ${{ inputs.mode == 'release' }}
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      # actions/checkout v6.0.2
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231
      - name: Verify requested tag matches manifest version
        env:
          REQUESTED_TAG: ${{ inputs.tag }}
        run: |
          test -n "$REQUESTED_TAG"
          version="$(jq -r '."."' .release-please-manifest.json)"
          expected_tag="v$version"
          test "$REQUESTED_TAG" = "$expected_tag" || {
            echo "Requested tag $REQUESTED_TAG does not match"
            echo "manifest version $expected_tag"
            exit 1
          }
      # googleapis/release-please-action v5
      - id: release
        uses:
          googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7
        with:
          skip-github-pull-request: true
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: master
      - name: Verify release creation
        env:
          RELEASE_CREATED: ${{ steps.release.outputs.release_created }}
          CREATED_TAG: ${{ steps.release.outputs.tag_name }}
          REQUESTED_TAG: ${{ inputs.tag }}
        run: |
          test "$RELEASE_CREATED" = "true"
          test -n "$CREATED_TAG"
          test "$CREATED_TAG" = "$REQUESTED_TAG"
